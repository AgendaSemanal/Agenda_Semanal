<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda Semanal</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ÁREA DO REEL */

.video-container{

    position:relative;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

}

/* VIDEO */

video{

    width:auto;
    height:90vh;

    max-width:100vw;

    object-fit:contain;

    border-radius:20px;

    background:black;

    box-shadow:0 0 40px rgba(0,0,0,0.5);

}

/* BOTÃO */

.play-button{

    position:absolute;

    bottom:40px;

    left:50%;
    transform:translateX(-50%);

    z-index:10;

    background:#0057ff;

    color:white;

    border:none;

    padding:16px 34px;

    border-radius:50px;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<div class="video-container">

    <video id="video" autoplay muted playsinline webkit-playsinline>

        <source src="Agenda Semanal.mp4" type="video/mp4">

    </video>

    <button class="play-button" id="btn">
        ABRIR AGENDA
    </button>

</div>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("btn");

async function startVideo(){

    try{
        await video.play();
    }catch(e){}

}

startVideo();

btn.addEventListener("click", async () => {

    video.muted = false;

    try{

        if(video.requestFullscreen){
            await video.requestFullscreen();
        }else if(video.webkitEnterFullscreen){
            video.webkitEnterFullscreen();
        }

    }catch(e){}

    video.play();

});

</script>

</body>
</html>
